"$schema" = 'https://starship.rs/config-schema.json'

# Tema DEV — pensado para COMBINAR con la statusline de tmux (catppuccin mocha,
# estilo "rounded", acento mauve; ver programs/tmux.nix), que es justo la barra que
# usas al levantar servidores dentro del devShell.
#
# Principios (aprendidos de las iteraciones):
#   - NO repetir la ruta: tmux ya la muestra abajo. Aquí NO va $directory.
#   - Pastillas redondeadas (   ) mocha, lideradas por mauve, como los pills de tmux.
#   - Cada pastilla se CIERRA sola (no depende de otro módulo) -> nunca hay cabos
#     sueltos aunque un módulo esté oculto (p. ej. git_status en repo limpio).
#   - El estado de git (?↑…) es una pastilla-insignia que solo aparece si hay cambios.
#   - El ❯ va en la MISMA línea, con una línea en blanco arriba, para que respire y
#     no quede aplastado contra la barra de tmux.
# Se activa SOLO dentro de devShells de Nix (fish.nix -> STARSHIP_CONFIG).

format = """
$git_branch\
$git_status\
$c$nodejs$bun$python$rust$golang\
$cmd_duration\
$character"""

palette = 'catppuccin_mocha'
add_newline = true

# --- Git: rama (pastilla mauve, siempre en repo) ----------------------------
[git_branch]
symbol = ""
style = "fg:crust bg:mauve"
format = '[](fg:mauve)[  $branch ]($style)[](fg:mauve) '

# --- Git: estado como insignia peach (solo si hay cambios) -------------------
[git_status]
style = "fg:crust bg:peach"
format = '[](fg:peach)[ $all_status$ahead_behind ]($style)[](fg:peach) '

# --- Lenguajes (una pastilla por runtime; solo una aparece por directorio) ---
[c]
symbol = " "
style = "fg:crust bg:blue"
format = '[](fg:blue)[ $symbol $version ]($style)[](fg:blue) '

[nodejs]
symbol = ""
style = "fg:crust bg:green"
format = '[](fg:green)[ $symbol $version ]($style)[](fg:green) '

[bun]
symbol = ""
style = "fg:crust bg:pink"
format = '[](fg:pink)[ $symbol bun $version ]($style)[](fg:pink) '

[python]
symbol = ""
style = "fg:crust bg:yellow"
format = '[](fg:yellow)[ $symbol $version ]($style)[](fg:yellow) '

[rust]
symbol = ""
style = "fg:crust bg:maroon"
format = '[](fg:maroon)[ $symbol $version ]($style)[](fg:maroon) '

[golang]
symbol = ""
style = "fg:crust bg:sapphire"
format = '[](fg:sapphire)[ $symbol $version ]($style)[](fg:sapphire) '

# --- Duración: pastilla sutil (surface0), solo si tardó algo -----------------
[cmd_duration]
min_time = 2000
style = "fg:text bg:surface0"
format = '[](fg:surface0)[  $duration ]($style)[](fg:surface0) '

# --- Símbolo: mauve, el acento de tmux. En su línea NO; inline para que respire.
[character]
success_symbol = '[❯](bold mauve)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold mauve)'

# Paleta catppuccin mocha oficial (github.com/catppuccin/starship).
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
