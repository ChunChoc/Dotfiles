"$schema" = 'https://starship.rs/config-schema.json'

# Tema DEV — pensado para COMBINAR con la statusline de tmux (catppuccin mocha,
# estilo "rounded", acento mauve; ver programs/tmux.nix). Mismo lenguaje visual:
# pastillas redondeadas (semicírculos    ), iconos por módulo y mauve como color
# protagónico. Se activa SOLO dentro de devShells de Nix (fish.nix -> STARSHIP_CONFIG),
# que es justo cuando usas tmux para levantar los servidores.

format = """
$directory\
$git_branch\
$git_status\
$c$nodejs$bun$python$rust$golang\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'
add_newline = true

# --- Directorio: pastilla mauve (mismo acento que tmux) ---------------------
[directory]
style = "fg:crust bg:mauve"
format = '[](fg:mauve)[ 󰉋 $path ]($style)[](fg:mauve) '
truncation_length = 3
truncation_symbol = "…/"

# --- Git --------------------------------------------------------------------
[git_branch]
symbol = ""
style = "fg:crust bg:lavender"
format = '[](fg:lavender)[ $symbol $branch ]($style)[](fg:lavender) '

[git_status]
style = "fg:crust bg:peach"
format = '([](fg:peach)[ $all_status$ahead_behind ]($style)[](fg:peach) )'

# --- Lenguajes (una pastilla por runtime, colores mocha) --------------------
[c]
symbol = " "
style = "fg:crust bg:blue"
format = '([](fg:blue)[ $symbol $version ]($style)[](fg:blue) )'

[nodejs]
symbol = ""
style = "fg:crust bg:green"
format = '([](fg:green)[ $symbol $version ]($style)[](fg:green) )'

[bun]
symbol = ""
style = "fg:crust bg:pink"
format = '([](fg:pink)[ $symbol bun $version ]($style)[](fg:pink) )'

[python]
symbol = ""
style = "fg:crust bg:yellow"
format = '([](fg:yellow)[ $symbol $version ]($style)[](fg:yellow) )'

[rust]
symbol = ""
style = "fg:crust bg:maroon"
format = '([](fg:maroon)[ $symbol $version ]($style)[](fg:maroon) )'

[golang]
symbol = ""
style = "fg:crust bg:sapphire"
format = '([](fg:sapphire)[ $symbol $version ]($style)[](fg:sapphire) )'

# --- Duración: pastilla sutil (surface0) ------------------------------------
[cmd_duration]
min_time = 500
style = "fg:text bg:surface0"
format = '([](fg:surface0)[  $duration ]($style)[](fg:surface0) )'

[line_break]
disabled = false

# --- Símbolo: mauve, como el acento de tmux ---------------------------------
[character]
success_symbol = '[❯](bold mauve)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold mauve)'

# Paleta catppuccin mocha oficial (github.com/catppuccin/starship).
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
